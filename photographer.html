<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photographer</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      color: #fff;
      background: linear-gradient(135deg, #0f172a, #1e3a8a);
      padding: 24px;
    }
    .card {
      max-width: 520px;
      width: 100%;
      padding: 28px;
      border-radius: 24px;
      background: rgba(255,255,255,0.1);
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
      backdrop-filter: blur(12px);
      text-align: center;
    }
    h1 { margin-bottom: 12px; }
    p { line-height: 1.6; color: #e2e8f0; }
    a {
      display: inline-block;
      margin-top: 18px;
      padding: 10px 18px;
      border-radius: 999px;
      background: #fff;
      color: #111827;
      text-decoration: none;
      font-weight: 700;
    }
    .portfolio-icon {
      width: 48px;
      height: 48px;
      margin-left: 10px;
      padding: 0;
      display: inline-grid;
      place-items: center;
      vertical-align: middle;
      font-size: 24px;
    }
    @media (max-width: 480px) {
      body { padding: 16px; }
      .card { padding: 22px 16px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Photographer</h1>
    <p>Capturing light, mood, and unforgettable moments through the lens.</p>
    <a href="index.html">Back to Home</a>
    <a class="portfolio-icon" href="Photographer/index.html" aria-label="Open photographer portfolio" title="Open portfolio">&#128247;</a>
  </div>
</body>
</html>
