<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCCM Gallery</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      padding: 32px 24px;
      font-family: Arial, sans-serif;
      background: #111827;
      color: #fff;
    }
    header { max-width: 1000px; margin: 0 auto 28px; text-align: center; }
    h1 { margin: 0 0 10px; }
    p { margin: 0; color: #cbd5e1; }
    .grid {
      max-width: 1000px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
    }
    .grid a {
      display: block;
      aspect-ratio: 1;
      overflow: hidden;
      border-radius: 16px;
      background: #1f2937;
    }
    .grid img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      transition: transform .25s ease;
    }
    .grid a:hover img { transform: scale(1.07); }
  </style>
</head>
<body>
  <header>
    <h1>SCCM</h1>
    <p>Select an image to open it in full size.</p>
  </header>

  <main class="grid" id="gallery" aria-label="SCCM image gallery"></main>

  <script>
    const images = [
      '1 (1).jpeg', '1 (2).jpeg', '1 (3).jpeg', '1 (4).jpeg',
      '1 (5).jpeg', '1 (6).jpeg', '1 (7).jpeg', '1 (8).jpeg',
      '1 (9).jpeg', '1 (10).jpeg', '1 (11).jpeg', '1 (12).jpeg',
      '1 (13).jpeg', '1 (14).jpeg'
    ];

    const gallery = document.getElementById('gallery');
    images.forEach((fileName, index) => {
      const link = document.createElement('a');
      const image = document.createElement('img');
      link.href = fileName;
      link.target = '_blank';
      link.rel = 'noopener';
      link.title = `Open image ${index + 1}`;
      image.src = fileName;
      image.alt = `SCCM image ${index + 1}`;
      image.loading = 'lazy';
      link.appendChild(image);
      gallery.appendChild(link);
    });
  </script>
</body>
</html>
