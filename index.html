<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Developer Folder</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #020617, #0f172a 45%, #1d4ed8);
      color: #f8fafc;
      padding: 24px;
    }
    .wrap {
      max-width: 980px;
      margin: 0 auto;
    }
    .hero {
      text-align: center;
      padding: 24px;
      border-radius: 24px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(14px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.25);
      margin-bottom: 24px;
    }
    .hero h1 { margin: 0 0 10px; font-size: 2rem; }
    .hero p { margin: 0; color: #cbd5e1; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }
    .card {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 18px;
      padding: 16px;
      text-align: center;
      box-shadow: 0 10px 24px rgba(0,0,0,0.2);
    }
    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 10px;
      border: 1px solid rgba(255,255,255,0.14);
    }
    .card a {
      display: inline-block;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      padding: 8px 12px;
      border-radius: 999px;
      background: linear-gradient(90deg, #38bdf8, #6366f1);
    }
    .back {
      display: inline-block;
      margin-top: 24px;
      color: #fff;
      text-decoration: none;
      background: rgba(255,255,255,0.16);
      padding: 10px 14px;
      border-radius: 999px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>Developer Gallery</h1>
      <p>Creative coding, UI ideas, Fucking funny images . FREE Accounts hah</p>
    </div>
