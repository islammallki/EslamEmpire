<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Footballer</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      color: #fff;
      background:
        linear-gradient(rgba(15, 23, 42, 0.68), rgba(20, 83, 45, 0.72)),
        url("ACCM/WA0000%20(4).jpg") center / cover fixed;
      padding: 24px;
    }
    .card {
      max-width: 720px;
      width: 100%;
      padding: 28px;
      border-radius: 24px;
      background: rgba(255,255,255,0.1);
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
      backdrop-filter: blur(12px);
      text-align: center;
    }
    h1 { margin-bottom: 12px; }
    p { line-height: 1.6; color: #fef2f2; margin-bottom: 20px; }
    .folders {
      display: grid;
      grid-template-columns: repeat(2, minmax(140px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }
    .folder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px 12px;
      border-radius: 16px;
      background: rgba(255,255,255,0.14);
      color: #fff;
      text-decoration: none;
      transition: transform 0.2s ease, background 0.2s ease;
    }
    .folder:hover {
      transform: translateY(-4px);
      background: rgba(255,255,255,0.22);
    }
    .folder-icon {
      font-size: 42px;
      margin-bottom: 8px;
    }
    .back-link {
      display: inline-block;
      margin-top: 18px;
      padding: 10px 18px;
      border-radius: 999px;
      background: #fff;
      color: #111827;
      text-decoration: none;
      font-weight: 700;
    }
    .bottom-gif {
      display: block;
      width: min(220px, 65vw);
      margin: 22px auto 0;
      border-radius: 14px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.35);
    }
    @media (max-width: 480px) {
      body { padding: 16px; }
      .card { padding: 22px 16px; }
      .folders { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Football Pictures</h1>
    <p>Passion for the game, discipline on the field, and teamwork everywhere.</p>
    <div class="folders">
      <a class="folder" href="ACCM/index.html">
        <div class="folder-icon">📁</div>
        <span>ACCM</span>
      </a>
      <a class="folder" href="SCCM/">
        <div class="folder-icon">📁</div>
        <span>SCCM</span>
      </a>
      <a class="folder" href="Khatari%20%20Soccer/">
        <div class="folder-icon">📁</div>
        <span>Khatari Soccer</span>
      </a>
      <a class="folder" href="AS%20Far/">
        <div class="folder-icon">📁</div>
        <span>AS Far</span>
      </a>
      <a class="folder" href="CV/">
        <div class="folder-icon">📁</div>
        <span>CV</span>
      </a>
    </div>
    <a class="back-link" href="index.html">Back to Home</a>
    <img class="bottom-gif" src="https://media.giphy.com/media/3o7TKJGzjiUHF26oNO/giphy.gif" alt="Animated football celebration">
  </div>
</body>
</html>
