<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photographer Portfolio</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      padding: 32px 24px;
      font-family: Arial, sans-serif;
      color: #fff;
      background: linear-gradient(135deg, #0f172a, #1e3a8a);
    }
    header { max-width: 1100px; margin: 0 auto 28px; text-align: center; }
    h1 { margin: 0 0 10px; }
    p { margin: 0; color: #e2e8f0; line-height: 1.6; }
    .gallery {
      max-width: 1100px;
      margin: auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
    }
    .gallery a {
      display: block;
      overflow: hidden;
      aspect-ratio: 1;
      border-radius: 14px;
      background: #172554;
      box-shadow: 0 10px 24px rgba(0, 0, 0, .2);
    }
    .gallery img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      transition: transform .25s ease;
    }
    .gallery a:hover img { transform: scale(1.07); }
    .back {
      display: block;
      width: fit-content;
      margin: 30px auto 0;
      padding: 10px 18px;
      border-radius: 999px;
      background: #fff;
      color: #111827;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <header>
    <h1>Photography Portfolio</h1>
    <p>Select a photo to open it in full size.</p>
  </header>

  <main class="gallery" id="gallery" aria-label="Photography gallery"></main>
  <a class="back" href="../photographer.html">Back to Photographer</a>

  <script>
    const images = [
      '1 (5).jpeg',
      '1 (6).jpeg',
      '1 (7).jpeg',
      ' 1 (8).jpeg',
      ' 1 (9).jpeg',
      ' 1 (10).jpeg',
      '   1 (11).jpeg', 
      ' 1 (12).jpeg',
      '1 (13).jpeg',
      '1 (14).jpeg',
      ' 1 (15).jpeg',
      ' 1 (16).jpeg',
      ' 1 (17).jpeg',
      ' 1 (18).jpeg',
      ' 1 (19).jpeg',
      ' 1 (20).jpeg',
      ' 1 (21).jpeg',
      ' 1 (22).jpeg',
      ' 1 (23).jpeg',
      ' 1 (24).jpeg',
      ' 1 (25).jpeg',
      ' 1 (26).jpeg',
      ' 1 (27).jpeg',
      ' 1 (28).jpeg',
      ' 1 (29).jpeg',
      ' 1 (30).jpeg',
      ' 1 (31).jpeg',
      ' 1 (32).jpeg',
      ' 1 (33).jpeg',
    ];

    const gallery = document.getElementById('gallery');
    images.forEach((fileName, index) => {
      const link = document.createElement('a');
      const image = document.createElement('img');
      link.href = fileName;
      link.target = '_blank';
      link.rel = 'noopener';
      link.title = `Open photo ${index + 1}`;
      image.src = fileName;
      image.alt = `Portfolio photo ${index + 1}`;
      image.loading = 'lazy';
      link.appendChild(image);
      gallery.appendChild(link);
    });
  </script>
</body>
</html>
