  <title>ACCM</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 24px; background: #0f172a; color: #fff; }
    h1 { text-align: center; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; max-width: 900px; margin: 0 auto; }
    .box { padding: 16px; background: rgba(255,255,255,0.12); border-radius: 16px; text-align: center; }
    .box a { display: block; }
    .box img { display: block; width: 100%; height: 140px; object-fit: cover; border-radius: 12px; transition: transform 0.2s ease; }
    .box a:hover img { transform: scale(1.03); }
  </style>
</head>
<body>
  <h1>ACCM</h1>
