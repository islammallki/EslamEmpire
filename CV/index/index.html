<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Contact details for footballer Eslam Malki.">
  <title>Contact Me | Eslam Malki</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --ink:#07111f; --panel:#10243d; --soft:#aabbd0; --white:#f7fbff; --cyan:#51f3ff; --violet:#8d70ff; --lime:#d8ff43; }
    * { box-sizing:border-box; }
    body { min-height:100vh; margin:0; display:grid; place-items:center; overflow:hidden; color:var(--white); background:var(--ink); font-family:Inter,Arial,sans-serif; }
    body::before,body::after { content:""; position:fixed; border-radius:50%; filter:blur(6px); pointer-events:none; }
    body::before { width:480px; height:480px; top:-230px; right:-110px; background:rgba(141,112,255,.28); }
    body::after { width:370px; height:370px; bottom:-180px; left:-100px; background:rgba(81,243,255,.16); }
    .contact-card { position:relative; width:min(940px,calc(100% - 40px)); padding:clamp(30px,6vw,64px); overflow:hidden; border:1px solid rgba(81,243,255,.4); background:linear-gradient(135deg,rgba(81,243,255,.11),transparent 45%),linear-gradient(315deg,rgba(141,112,255,.13),transparent 48%),rgba(13,27,45,.92); box-shadow:22px 24px 0 rgba(141,112,255,.16),0 30px 80px rgba(0,0,0,.35); }
    .contact-card::after { content:"09"; position:absolute; right:-18px; bottom:-84px; color:rgba(81,243,255,.06); font:800 19rem/.8 'Barlow Condensed',sans-serif; }
    .top { position:relative; z-index:1; display:flex; justify-content:space-between; gap:24px; align-items:start; margin-bottom:44px; }
    .eyebrow { display:flex; align-items:center; gap:9px; color:var(--lime); font-size:.7rem; font-weight:800; letter-spacing:.16em; text-transform:uppercase; }
    .eyebrow::before { content:""; width:28px; height:2px; background:var(--lime); box-shadow:0 0 12px var(--lime); }
    h1 { max-width:570px; margin:13px 0 10px; font:800 clamp(3.6rem,9vw,7rem)/.78 'Barlow Condensed',sans-serif; letter-spacing:-.025em; text-transform:uppercase; }
    h1 span { color:var(--cyan); text-shadow:0 0 24px rgba(81,243,255,.35); }
    .intro { max-width:530px; margin:0; color:var(--soft); line-height:1.7; }
    .back { flex:0 0 auto; padding:12px 15px; color:var(--white); border:1px solid rgba(255,255,255,.28); text-decoration:none; font-size:.72rem; font-weight:800; letter-spacing:.08em; text-transform:uppercase; transition:.2s; }
    .back:hover { color:var(--ink); background:var(--cyan); border-color:var(--cyan); }
    .details { position:relative; z-index:1; display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
    .detail { min-height:118px; padding:22px; border:1px solid rgba(255,255,255,.1); background:rgba(7,17,31,.52); transition:transform .2s,border-color .2s; }
    .detail:hover { transform:translateY(-4px); border-color:rgba(81,243,255,.55); }
    .detail small { display:block; margin-bottom:10px; color:var(--cyan); font-size:.66rem; font-weight:800; letter-spacing:.13em; text-transform:uppercase; }
    .detail span,.detail a { color:var(--white); font-size:.96rem; font-weight:600; overflow-wrap:anywhere; }
    .detail a:hover { color:var(--lime); }
    .detail.full { grid-column:1 / -1; }
    .note { position:relative; z-index:1; margin:23px 0 0; color:var(--soft); font-size:.76rem; }
    @media (max-width:620px) { body { overflow:auto; padding:28px 0; } .contact-card { width:calc(100% - 32px); } .top { display:block; } .back { display:inline-block; margin-top:25px; } .details { grid-template-columns:1fr; } .detail.full { grid-column:auto; } }
  </style>
</head>
<body>
  <main class="contact-card">
    <div class="top">
      <div>
        <span class="eyebrow">Footballer · Player CV</span>
        <h1>Contact <span>Me.</span></h1>
        <p class="intro">Available for trials, teams, collaborations, and football opportunities.</p>
      </div>
      <a class="back" href="../index.html">← Back to CV</a>
    </div>
    <section class="details" aria-label="Contact details">
      <article class="detail"><small>Full name</small><span>Islam Malki</span></article>
      <article class="detail"><small>Email</small><a href="mailto:your.email@example.com">eslammalki09@gmail.com</a></article>
      <article class="detail"><small>WhatsApp</small><span>+212 663257540</span></article>
      <article class="detail"><small>Location</small><span>Morocco,Mohammedia</span></article>
      <article class="detail full"><small>Instagram</small><a href="https://www.instagram.com/islvm.09/" target="_blank" rel="noreferrer noopener">@islvm.09</a></article>
    </section>
    <p class="note">Thank you for your interest!</p>
  </main>
</body>
</html>
